<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  font-size: 36px;
  margin: 15px 0;
}

/* 🔥 FLEXIBLE GRID (2 columns, many rows) */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 14px;
}

/* BUTTON STYLE */
.grid a {
  text-decoration: none;
}

.grid button {
  width: 100%;
  height: 90px;   /* controls height */
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 18px;
  color: black;
}

/* COLORS */
.call { background: #ff8a8a; }
.music { background: #7ee081; }
.youtube { background: #ff6b6b; }
.comedy { background: #9fd0ff; }
.extra { background: #ffd580; }
</style>
</head>

<body>

<h1>HOME</h1>

<div class="grid">

<a href="#"><button class="call">1 CALL FAMILY</button></a>
<a href="music.html"><button class="music">2 MUSIC</button></a>

<a href="https://www.youtube.com"><button class="youtube">3 YOUTUBE</button></a>
<a href="https://www.youtube.com/results?search_query=comedy"><button class="comedy">4 COMEDY</button></a>

<a href="#"><button class="extra">5</button></a>
<a href="#"><button class="extra">6</button></a>

<a href="#"><button class="extra">7</button></a>
<a href="#"><button class="extra">8</button></a>

<a href="#"><button class="extra">9</button></a>
<a href="#"><button class="extra">10</button></a>

<a href="#"><button class="extra">11</button></a>
<a href="#"><button class="extra">12</button></a>

<a href="#"><button class="extra">13</button></a>
<a href="#"><button class="extra">14</button></a>

</div>

</body>
</html>
