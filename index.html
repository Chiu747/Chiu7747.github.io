<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOME</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  font-size: 40px;
  margin: 20px 0;
}

/* GRID FIX */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
  height: calc(100vh - 100px);
  box-sizing: border-box;
}

button {
  font-size: 22px;
  font-weight: bold;
  border-radius: 20px;
  border: none;
  width: 100%;
  height: 100%;
}

/* COLORS */
.call { background: #ff6b6b; }
.music { background: #2ecc71; }
.youtube { background: #ff4d4d; }
.comedy { background: #4da6ff; }

a {
  text-decoration: none;
}
</style>
</head>

<body>

<h1>HOME</h1>

<div class="grid">

<a href="#">
<button class="call">1 CALL FAMILY</button>
</a>

<a href="music.html">
<button class="music">2 MUSIC</button>
</a>

<a href="https://www.youtube.com">
<button class="youtube">3 YOUTUBE</button>
</a>

<a href="https://www.youtube.com/results?search_query=comedy">
<button class="comedy">4 COMEDY</button>
</a>

</div>

</body>
</html>
